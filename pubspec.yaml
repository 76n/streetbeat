name: streetbeat
description: "The city is your track."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^4.14.0
  cloud_functions: ^4.6.0
  equatable: ^2.0.5
  firebase_auth: ^4.16.0
  firebase_core: ^2.24.2
  firebase_storage: ^11.6.0
  fl_chart: ^0.66.2
  flutter_bloc: ^8.1.3
  flutter_local_notifications: ^17.2.3
  flutter_map: ^6.1.0
  geolocator: ^11.0.0
  get_it: ^7.6.7
  go_router: ^13.2.0
  google_sign_in: ^6.2.1
  http: ^1.2.0
  intl: ^0.19.0
  latlong2: ^0.9.1
  lottie: ^3.1.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  share_plus: ^10.1.4
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
